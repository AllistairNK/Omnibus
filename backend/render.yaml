# Render Blueprint for AI Chatbot Backend
services:
  - type: web
    name: ai-chatbot-backend
    runtime: python
    buildCommand: pip install --no-cache-dir .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: supabase-postgres
          property: connectionString
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: BACKEND_CORS_ORIGINS
        value: https://your-frontend-domain.com
      - key: CHROMA_HOST
        value: your-chromadb-host
      - key: CHROMA_PORT
        value: "8000"
    healthCheckPath: /api/v1/health
    autoDeploy: true
    disk:
      name: chroma-data
      mountPath: /chroma/chroma_data
      sizeGB: 10

databases:
  - name: supabase-postgres
    databaseName: postgres
    plan: free