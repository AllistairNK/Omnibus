<div class="chat-container">
  <mat-card class="chat-card">
    <mat-card-header>
      <mat-card-title>AI Chatbot Terminal</mat-card-title>
      <mat-card-subtitle>Ask questions and get RAG-powered answers</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <div class="messages-container">
        <div *ngFor="let msg of messages" class="message" [class.user]="msg.sender === 'user'" [class.bot]="msg.sender === 'bot'">
          <div class="message-sender">{{ msg.sender === 'user' ? 'You' : 'AI Assistant' }}</div>
          <div class="message-text">{{ msg.text }}</div>
          <div class="message-time">{{ msg.timestamp | date:'shortTime' }}</div>
        </div>
      </div>
      <div class="input-container">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Type your message...</mat-label>
          <input matInput [(ngModel)]="newMessage" (keyup.enter)="sendMessage()">
          <button mat-icon-button matSuffix (click)="sendMessage()">
            <mat-icon>send</mat-icon>
          </button>
        </mat-form-field>
      </div>
    </mat-card-content>
  </mat-card>
</div>
