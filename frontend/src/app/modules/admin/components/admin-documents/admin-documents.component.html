<div class="admin-documents-container">
  <h2>Document Audit Log</h2>

  <div *ngIf="error" class="error-card">
    <mat-card>
      <mat-card-content>
        <mat-icon color="warn">error</mat-icon>
        <span>{{ error }}</span>
      </mat-card-content>
    </mat-card>
  </div>

  <div *ngIf="loading" class="loading-spinner">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <div *ngIf="!loading && !error">
    <div class="filters-section">
      <mat-form-field appearance="outline">
        <mat-label>Document ID</mat-label>
        <input matInput [(ngModel)]="documentIdFilter" placeholder="Filter by document ID">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>User ID</mat-label>
        <input matInput [(ngModel)]="userIdFilter" placeholder="Filter by user ID">
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Action</mat-label>
        <input matInput [(ngModel)]="actionFilter" placeholder="Filter by action">
      </mat-form-field>

      <button mat-raised-button color="primary" (click)="loadAuditEntries()">
        <mat-icon>search</mat-icon>
        Apply Filters
      </button>
    </div>

    <div class="table-container">
      <table mat-table [dataSource]="auditEntries" class="mat-elevation-z1">
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef>ID</th>
          <td mat-cell *matCellDef="let entry">{{ entry.id | slice:0:8 }}...</td>
        </ng-container>

        <ng-container matColumnDef="document_id">
          <th mat-header-cell *matHeaderCellDef>Document ID</th>
          <td mat-cell *matCellDef="let entry">{{ entry.document_id | slice:0:8 }}...</td>
        </ng-container>

        <ng-container matColumnDef="user_id">
          <th mat-header-cell *matHeaderCellDef>User ID</th>
          <td mat-cell *matCellDef="let entry">{{ entry.user_id | slice:0:8 }}...</td>
        </ng-container>

        <ng-container matColumnDef="action">
          <th mat-header-cell *matHeaderCellDef>Action</th>
          <td mat-cell *matCellDef="let entry">
            <mat-chip [color]="getActionColor(entry.action)" selected="true">
              {{ entry.action }}
            </mat-chip>
          </td>
        </ng-container>

        <ng-container matColumnDef="timestamp">
          <th mat-header-cell *matHeaderCellDef>Timestamp</th>
          <td mat-cell *matCellDef="let entry">{{ entry.timestamp | date:'medium' }}</td>
        </ng-container>

        <ng-container matColumnDef="details">
          <th mat-header-cell *matHeaderCellDef>Details</th>
          <td mat-cell *matCellDef="let entry">
            <button mat-icon-button (click)="viewDetails(entry)">
              <mat-icon>info</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <mat-paginator [length]="totalEntries"
                     [pageSize]="pageSize"
                     [pageSizeOptions]="[10, 20, 50]"
                     (page)="onPageChange($event)">
      </mat-paginator>
    </div>
  </div>
</div>
