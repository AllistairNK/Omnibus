<div class="login-container">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Login to AI Chatbot</mat-card-title>
      <mat-card-subtitle>Enter your credentials to continue</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email</mat-label>
          <input matInput formControlName="email" type="email" placeholder="user@example.com">
          <mat-icon matSuffix>email</mat-icon>
          <mat-error *ngIf="loginForm.get('email')?.hasError('required')">
            Email is required
          </mat-error>
          <mat-error *ngIf="loginForm.get('email')?.hasError('email')">
            Please enter a valid email
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password">
          <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
            <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
            Password is required
          </mat-error>
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit" class="full-width" [disabled]="!loginForm.valid || isLoading">
          <span *ngIf="!isLoading">Login</span>
          <span *ngIf="isLoading">
            <mat-spinner diameter="20" class="spinner"></mat-spinner>
            Logging in...
          </span>
        </button>
        
      </form>
    </mat-card-content>
    <div class="bypass-section">
      <button mat-raised-button color="accent" (click)="onBypassLogin()" [disabled]="isLoading">
        Bypass Login (Demo)
      </button>
      <button mat-raised-button color="primary" routerLink="/chat">Go to Chat</button>
    </div>

    <mat-card-actions>
      <a routerLink="/auth/register" mat-button>Create an account</a>
      <a routerLink="/auth/forgot-password" mat-button>Forgot password?</a>
    </mat-card-actions>
  </mat-card>
</div>
