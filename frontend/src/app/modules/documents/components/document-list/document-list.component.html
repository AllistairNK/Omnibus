<div class="documents-container">
  <mat-card class="documents-card">
    <mat-card-header>
      <mat-card-title>Document Management</mat-card-title>
      <mat-card-subtitle>Uploaded documents for RAG processing</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <table mat-table [dataSource]="documents" class="mat-elevation-z2">
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef> Name </th>
          <td mat-cell *matCellDef="let doc"> {{ doc.name }} </td>
        </ng-container>
        <ng-container matColumnDef="size">
          <th mat-header-cell *matHeaderCellDef> Size </th>
          <td mat-cell *matCellDef="let doc"> {{ doc.size }} </td>
        </ng-container>
        <ng-container matColumnDef="uploaded">
          <th mat-header-cell *matHeaderCellDef> Uploaded </th>
          <td mat-cell *matCellDef="let doc"> {{ doc.uploaded }} </td>
        </ng-container>
        <ng-container matColumnDef="status">
          <th mat-header-cell *matHeaderCellDef> Status </th>
          <td mat-cell *matCellDef="let doc">
            <span [class]="'status-badge ' + doc.status.toLowerCase()">{{ doc.status }}</span>
          </td>
        </ng-container>
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef> Actions </th>
          <td mat-cell *matCellDef="let doc">
            <button mat-icon-button color="primary">
              <mat-icon>visibility</mat-icon>
            </button>
            <button mat-icon-button color="warn">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </mat-card-content>
    <mat-card-actions>
      <button mat-raised-button color="primary">
        <mat-icon>upload</mat-icon>
        Upload New Document
      </button>
    </mat-card-actions>
  </mat-card>
</div>
